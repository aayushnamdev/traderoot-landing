<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="#1C3A2E"/>
  <!-- trunk -->
  <line x1="32" y1="15" x2="32" y2="38" stroke="#5dcaa5" stroke-width="2.2" stroke-linecap="round"/>
  <!-- left branch -->
  <line x1="32" y1="23" x2="22" y2="18" stroke="#5dcaa5" stroke-width="1.8" stroke-linecap="round"/>
  <!-- right branch -->
  <line x1="32" y1="21" x2="42" y2="16" stroke="#5dcaa5" stroke-width="1.8" stroke-linecap="round"/>
  <!-- leaf nodes -->
  <circle cx="32" cy="12" r="4.5" fill="#5dcaa5"/>
  <circle cx="19" cy="15" r="3.8" fill="#0a5c48"/>
  <circle cx="24" cy="14" r="3" fill="#5dcaa5"/>
  <circle cx="45" cy="13" r="3.8" fill="#0a5c48"/>
  <circle cx="40" cy="12" r="3" fill="#1a8a6a"/>
  <!-- ground line -->
  <line x1="14" y1="38" x2="50" y2="38" stroke="#5dcaa5" stroke-width="0.8" opacity="0.6"/>
  <!-- root candlesticks -->
  <line x1="20" y1="38" x2="20" y2="54" stroke="#5dcaa5" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="17" y="42" width="6" height="8" rx="1" fill="#5dcaa5" opacity="0.7"/>
  <line x1="32" y1="38" x2="32" y2="54" stroke="#5dcaa5" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="29" y="41" width="6" height="9" rx="1" stroke="#5dcaa5" stroke-width="1.2" fill="none"/>
  <line x1="44" y1="38" x2="44" y2="54" stroke="#5dcaa5" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="41" y="43" width="6" height="7" rx="1" fill="#5dcaa5" opacity="0.7"/>
</svg>
